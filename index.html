<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발명자 정보 음역</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  header { background: #1e3a5f; color: white; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header h1 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .btn-load-case { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 7px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-load-case:hover { background: rgba(255,255,255,0.25); }

  .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

  .step-bar { display: flex; align-items: center; margin-bottom: 28px; }
  .step { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 500; color: #a0aec0; }
  .step.active { color: #1e3a5f; }
  .step.done { color: #38a169; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; color: #718096; }
  .step.active .step-num { background: #1e3a5f; color: white; }
  .step.done .step-num { background: #38a169; color: white; }
  .step-line { flex: 1; height: 2px; background: #e2e8f0; margin: 0 10px; }

  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .card h2 { font-size: 1rem; font-weight: 600; color: #2d3748; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .pct-search { background: #ebf4ff; border: 1.5px solid #bee3f8; border-radius: 10px; padding: 14px 20px; margin-bottom: 16px; }
  .pct-search label { font-size: 0.8rem; font-weight: 700; color: #2b6cb0; text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 8px; }
  .pct-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .pct-row input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid #90cdf4; border-radius: 8px; font-size: 0.92rem; font-family: 'Courier New', monospace; letter-spacing: 0.5px; outline: none; color: #1a202c; background: white; transition: border-color 0.2s; }
  .pct-row input:focus { border-color: #2b6cb0; }
  .pct-row input::placeholder { font-family: 'Segoe UI', sans-serif; color: #a0aec0; letter-spacing: 0; }
  .btn-wipo { background: #2b6cb0; color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .btn-wipo:hover { background: #2c5282; }

  .paste-area { width: 100%; min-height: 130px; padding: 14px 16px; border: 2px dashed #cbd5e0; border-radius: 10px; font-size: 0.88rem; font-family: 'Segoe UI', sans-serif; color: #2d3748; resize: vertical; outline: none; transition: border-color 0.2s, background 0.2s; line-height: 1.6; }
  .paste-area:focus { border-color: #2b6cb0; background: #f7fbff; }
  .paste-area::placeholder { color: #a0aec0; line-height: 1.8; }
  .parse-hint { font-size: 0.78rem; color: #718096; margin-top: 8px; }

  .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .inventor-count { background: #1e3a5f; color: white; border-radius: 20px; padding: 4px 14px; font-size: 0.82rem; font-weight: 700; }

  .inv-table, .res-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .inv-table th, .res-table th { background: #f7fafc; color: #4a5568; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.4px; padding: 9px 12px; border-bottom: 2px solid #e2e8f0; text-align: left; white-space: nowrap; }
  .inv-table td, .res-table td { padding: 9px 12px; border-bottom: 1px solid #edf2f7; vertical-align: middle; color: #2d3748; }
  .inv-table tr:last-child td, .res-table tr:last-child td { border-bottom: none; }
  .inv-table tr:hover td, .res-table tr:hover td { background: #f7fafc; }
  .num-cell { color: #1e3a5f; font-weight: 800; font-size: 0.95rem; width: 36px; text-align: center; }

  .editable { outline: none; border-bottom: 1.5px dashed #cbd5e0; min-width: 80px; display: inline-block; padding: 2px 4px; transition: border-color 0.2s; }
  .editable:focus { border-bottom-color: #2b6cb0; background: #f0f8ff; border-radius: 3px; }

  .result-editable { outline: none; min-width: 60px; display: inline-block; padding: 3px 6px; border-radius: 5px; transition: background 0.15s; }
  .edit-mode .result-editable { background: #fffde7; border: 1.5px solid #f6e05e; cursor: text; }
  .result-editable:focus { background: #fffde7; border: 1.5px solid #ecc94b; outline: none; }

  .btn-del-sm { background: none; border: none; color: #cbd5e0; font-size: 1rem; cursor: pointer; padding: 2px 4px; transition: color 0.2s; }
  .btn-del-sm:hover { color: #e53e3e; }
  .btn-add-inline { background: #ebf4ff; border: 1.5px dashed #90cdf4; color: #2b6cb0; border-radius: 8px; padding: 7px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-add-inline:hover { background: #bee3f8; }

  .btn-primary { background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
  .btn-primary:hover { background: #2a4a7f; }
  .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
  .btn-secondary { background: #edf2f7; color: #4a5568; border: none; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-edit { background: #fffbeb; border: 1.5px solid #f6e05e; color: #744210; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-edit:hover { background: #fef3c7; }
  .btn-edit.active { background: #fef3c7; border-color: #ecc94b; }
  .btn-save { background: #ebf4ff; border: 1.5px solid #90cdf4; color: #2b6cb0; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-save:hover { background: #bee3f8; }
  .btn-mail { background: #f0f0ff; border: 1.5px solid #b794f4; color: #553c9a; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-mail:hover { background: #e9d8fd; }

  .action-row { display: flex; gap: 10px; align-items: center; margin-top: 18px; flex-wrap: wrap; }
  .table-wrap { overflow-x: auto; }

  td input.nat-input { width: 100%; min-width: 90px; padding: 6px 10px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
  td input.nat-input:focus { border-color: #1e3a5f; }

  .country-code-badge { display: inline-block; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 5px; padding: 3px 9px; font-size: 0.82rem; font-weight: 700; color: #4a5568; font-family: 'Courier New', monospace; letter-spacing: 0.5px; }
  .translated { color: #276749; font-weight: 500; }
  .pending { color: #a0aec0; font-style: italic; }

  .kr-addr-cell { line-height: 1.7; }
  .kr-addr-cell .addr-line { display: block; font-size: 0.82rem; }
  .kr-addr-cell .addr-label { font-size: 0.72rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.3px; margin-right: 4px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #e2e8f0; border-top-color: #1e3a5f; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notice { background: #fffbeb; border: 1px solid #f6e05e; border-radius: 8px; padding: 10px 14px; font-size: 0.83rem; color: #744210; margin-bottom: 16px; }
  .pct-badge { display: inline-block; background: #ebf4ff; color: #2b6cb0; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; margin-left: 4px; font-family: 'Courier New', monospace; }
  .parsing-indicator { display: inline-flex; align-items: center; gap: 8px; color: #2b6cb0; font-size: 0.85rem; font-weight: 600; padding: 8px 0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-size: 1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .modal label { font-size: 0.8rem; font-weight: 700; color: #4a5568; display: block; margin-bottom: 6px; }
  .modal input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.92rem; outline: none; transition: border-color 0.2s; }
  .modal input:focus { border-color: #1e3a5f; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .saved-list { margin-top: 4px; max-height: 220px; overflow-y: auto; }
  .saved-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem; }
  .saved-item:hover { background: #f7fafc; }
  .saved-item-info { display: flex; flex-direction: column; gap: 2px; }
  .saved-item-no { font-weight: 700; color: #1e3a5f; }
  .saved-item-date { font-size: 0.75rem; color: #a0aec0; }
  .saved-item-actions { display: flex; gap: 6px; }
  .btn-xs { border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
  .btn-xs.load { background: #ebf4ff; color: #2b6cb0; }
  .btn-xs.del { background: #fff5f5; color: #e53e3e; }

  .mail-preview { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; font-size: 0.82rem; color: #2d3748; line-height: 1.7; white-space: pre-wrap; max-height: 260px; overflow-y: auto; margin-bottom: 14px; }

  #section-step1-preview { display: none; }
  #section-step2 { display: none; }
</style>
</head>
<body>

<header>
  <h1 onclick="newSearch()">⚖️ 발명자 정보 음역 시스템</h1>
  <button class="btn-load-case" onclick="openLoadModal()">📂 사건 불러오기</button>
</header>

<div class="container">
  <div class="step-bar">
    <div class="step active" id="sb1"><div class="step-num">1</div>발명자 입력</div>
    <div class="step-line"></div>
    <div class="step" id="sb2"><div class="step-num">2</div>국적 입력</div>
    <div class="step-line"></div>
    <div class="step" id="sb3"><div class="step-num">3</div>번역 완료</div>
  </div>

  <!-- STEP 1 -->
  <div id="section-step1">
    <div class="pct-search">
      <label>🔍 PCT 번호로 WIPO 페이지 열기</label>
      <div class="pct-row">
        <input type="text" id="pct-input" placeholder="예: PCT/JP2024/034554" />
        <button class="btn-wipo" onclick="openWIPO()">🌐 WIPO에서 열기</button>
      </div>
    </div>
    <div class="card">
      <h2>📋 WIPO 발명자 정보 붙여넣기</h2>
      <textarea class="paste-area" id="paste-box" placeholder="WIPO 페이지에서 복사한 발명자 정보를 여기에 붙여넣기 하세요.

예시:
Inventors:
SMITH, John Michael; 123 Main Street, New York, NY 10001 (US)
KIM, Jinho; 456 Teheran-ro, Gangnam-gu, Seoul 06173 (KR)
TANAKA, Yuki; 1-2-3 Shinjuku, Tokyo 160-0022 (JP)"></textarea>
      <div class="parse-hint">✏️ 이름·주소가 포함된 텍스트라면 어떤 형식이든 인식합니다.</div>
      <div class="action-row">
        <button class="btn-primary" onclick="parseInventors()">🔎 발명자 추출</button>
        <span id="parsing-status"></span>
      </div>
    </div>
  </div>

  <!-- STEP 1-B -->
  <div id="section-step1-preview">
    <div class="card">
      <div class="preview-header">
        <h2 style="margin:0;">✅ 추출된 발명자 목록 <span id="pct-badge-label"></span></h2>
        <span class="inventor-count" id="inv-count-badge">0명</span>
      </div>
      <p style="font-size:0.82rem;color:#718096;margin-bottom:14px;">내용을 직접 수정할 수 있습니다. 확인 후 "표로 정리하기"를 눌러주세요.</p>
      <div class="table-wrap">
        <table class="inv-table">
          <thead><tr>
            <th style="width:36px;text-align:center;">#</th>
            <th>영문 이름</th><th>영문 주소</th>
            <th style="width:36px;"></th>
          </tr></thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>
      <div class="action-row">
        <button class="btn-primary" onclick="goStep2()">📊 표로 정리하기</button>
        <button class="btn-secondary" onclick="backToPaste()">← 다시 붙여넣기</button>
      </div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="section-step2">
    <div class="card">
      <h2>📋 발명자 정보 표 <span id="pct-badge-label2"></span> <span class="inventor-count" id="inv-count-badge2">0명</span></h2>
      <div class="notice">💡 국적을 입력한 후 "번역 시작" 버튼을 눌러주세요.</div>
      <div class="table-wrap">
        <table class="res-table" id="result-table">
          <thead><tr>
            <th style="width:36px;text-align:center;">#</th>
            <th>영문 이름 (원문)</th><th>영문 이름 (정제)</th><th>한글 음역</th>
            <th>영문 주소</th><th>한글 주소</th>
            <th>거주국</th><th>국적</th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="btn-translate" onclick="startTranslation()">🔄 번역 시작</button>
        <button class="btn-secondary" id="btn-back" onclick="backToPreview()">← 돌아가기</button>
        <button class="btn-edit" id="btn-edit" style="display:none;" onclick="toggleEditMode()">✏️ 수정</button>
        <button class="btn-save" id="btn-save" style="display:none;" onclick="openSaveModal()">💾 사건 저장</button>
        <button class="btn-mail" id="btn-mail" style="display:none;" onclick="openMailModal()">✉️ 검토 요청</button>
        <button class="btn-secondary" id="btn-new" style="display:none;" onclick="newSearch()">🔄 새 검색</button>
      </div>
    </div>
  </div>
</div>

<!-- 저장 모달 -->
<div class="modal-overlay" id="modal-save">
  <div class="modal">
    <h3>💾 사건 저장</h3>
    <label>건 번호</label>
    <input type="text" id="case-number-input" placeholder="예: PH000000" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-save')">취소</button>
      <button class="btn-primary" onclick="saveCase()">저장</button>
    </div>
  </div>
</div>

<!-- 불러오기 모달 -->
<div class="modal-overlay" id="modal-load">
  <div class="modal">
    <h3>📂 저장된 사건 목록</h3>
    <input type="text" id="case-search-input" placeholder="건번호 검색..." oninput="filterCases()"
      style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;outline:none;margin-bottom:12px;transition:border-color 0.2s;"
      onfocus="this.style.borderColor='#1e3a5f'" onblur="this.style.borderColor='#e2e8f0'" />
    <div class="saved-list" id="saved-list-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-load')">닫기</button>
    </div>
  </div>
</div>

<!-- 검토 요청 메일 모달 -->
<div class="modal-overlay" id="modal-mail">
  <div class="modal" style="width:520px;">
    <h3>✉️ 검토 요청</h3>
    <label style="margin-bottom:6px;display:block;">메일 초안</label>
    <div class="mail-preview" id="mail-preview-box"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-mail')">닫기</button>
      <button class="btn-primary" id="btn-copy-mail" onclick="copyMail()">📋 메일 복사</button>
    </div>
  </div>
</div>

<script>
let inventors = [];
let currentPCT = '';
let nextId = 1000;
let editMode = false;
let translationResults = {};
let allSavedItems = [];

const CODE_TO_NAME_EN = {
  US:'United States',KR:'Korea',JP:'Japan',CN:'China',DE:'Germany',
  GB:'United Kingdom',FR:'France',CA:'Canada',AU:'Australia',
  NL:'Netherlands',SE:'Sweden',CH:'Switzerland',IT:'Italy',
  ES:'Spain',IN:'India',TW:'Taiwan',SG:'Singapore',IL:'Israel',
  FI:'Finland',DK:'Denmark',NO:'Norway',BE:'Belgium',AT:'Austria',
  NZ:'New Zealand',BR:'Brazil',MX:'Mexico',RU:'Russia',PL:'Poland',
  CZ:'Czech Republic',HU:'Hungary',PT:'Portugal',IE:'Ireland',
  ZA:'South Africa',HK:'Hong Kong',MY:'Malaysia',TH:'Thailand',
  VN:'Vietnam',ID:'Indonesia',PH:'Philippines'
};
const CODE_TO_KO = {
  US:'미국',KR:'한국',JP:'일본',CN:'중국',DE:'독일',
  GB:'영국',FR:'프랑스',CA:'캐나다',AU:'호주',
  NL:'네덜란드',SE:'스웨덴',CH:'스위스',IT:'이탈리아',
  ES:'스페인',IN:'인도',TW:'대만',SG:'싱가포르',IL:'이스라엘',
  FI:'핀란드',DK:'덴마크',NO:'노르웨이',BE:'벨기에',AT:'오스트리아',
  NZ:'뉴질랜드',BR:'브라질',MX:'멕시코',RU:'러시아',PL:'폴란드',
  CZ:'체코',HU:'헝가리',PT:'포르투갈',IE:'아일랜드',
  ZA:'남아프리카공화국',HK:'홍콩',MY:'말레이시아',TH:'태국',
  VN:'베트남',ID:'인도네시아',PH:'필리핀'
};
const KO_TO_CODE = Object.fromEntries(Object.entries(CODE_TO_KO).map(([k,v])=>[v,k]));
const EN_TO_CODE = Object.fromEntries(Object.entries(CODE_TO_NAME_EN).map(([k,v])=>[v.toLowerCase(),k]));

function extractCountryCode(address) {
  if (!address) return '';
  const m = address.match(/\(([A-Z]{2})\)\s*$/) || address.match(/,\s*([A-Z]{2})\s*$/);
  if (m && CODE_TO_NAME_EN[m[1]]) return m[1];
  const lower = address.toLowerCase();
  for (const [en, code] of Object.entries(EN_TO_CODE))
    if (lower.includes(en)) return code;
  return '';
}
function natInputToCode(val) {
  const v = val.trim();
  if (!v) return '';
  if (CODE_TO_KO[v.toUpperCase()]) return v.toUpperCase();
  if (KO_TO_CODE[v]) return KO_TO_CODE[v];
  return v;
}
function codeToKo(code) { return CODE_TO_KO[code] || code; }

function showPostTranslationButtons() {
  ['btn-edit','btn-save','btn-mail','btn-new'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'inline-flex';
  });
}
function hidePostTranslationButtons() {
  ['btn-edit','btn-save','btn-mail','btn-new'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

/* ── PCT ── */
function openWIPO() {
  const val = document.getElementById('pct-input').value.trim();
  if (!val) { alert('PCT 번호를 입력해주세요.'); return; }
  currentPCT = val;
  updateBadges(val);
  // PCT/JP2024/034554 → PCTJP2024034554
  const docId = 'PCT' + val.replace(/^PCT\//i, '').replace(/\//g, '');
  window.open(`https://patentscope.wipo.int/search/ko/detail.jsf?docId=${docId}`, '_blank');
}

function updateBadges(val) {
  const b = val ? `<span class="pct-badge">${escHtml(val)}</span>` : '';
  document.getElementById('pct-badge-label').innerHTML = b;
  document.getElementById('pct-badge-label2').innerHTML = b;
}

/* ── Parse ── */
async function parseInventors() {
  const text = document.getElementById('paste-box').value.trim();
  if (!text) { alert('발명자 정보를 붙여넣기 해주세요.'); return; }
  const status = document.getElementById('parsing-status');
  status.innerHTML = '<span class="parsing-indicator"><span class="spinner"></span> AI가 발명자 정보를 분석 중...</span>';
  const prompt = `아래 텍스트에서 발명자(inventor) 정보를 추출해주세요.\n규칙:\n- 각 발명자의 이름(영문)과 주소(영문)를 추출하세요.\n- 이름은 원문 그대로 유지하세요.\n- 주소가 없으면 빈 문자열로 남기세요.\n- 반드시 JSON 배열만 반환하세요.\n\n텍스트:\n${text}\n\n응답 형식 (JSON만):\n[{"name":"영문 이름","address":"영문 주소"},...]`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const raw = data.content.map(b=>b.text||'').join('');
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    if (!parsed.length) { status.innerHTML='<span style="color:#e53e3e;font-size:0.85rem;">발명자 정보를 찾을 수 없습니다.</span>'; return; }
    inventors = parsed.map((p,i)=>({
      id:i+1, name:p.name||'',
      address:(p.address||'').replace(/\s*\(([A-Z]{2})\)\s*$/,(_,code)=>CODE_TO_NAME_EN[code]?`, ${CODE_TO_NAME_EN[code]}`:`(${code})`)
    }));
    nextId = inventors.length + 1;
    renderPreview();
    status.innerHTML = '';
    document.getElementById('section-step1').style.display = 'none';
    document.getElementById('section-step1-preview').style.display = 'block';
  } catch(e) { status.innerHTML='<span style="color:#e53e3e;font-size:0.85rem;">오류가 발생했습니다.</span>'; }
}

function renderPreview() {
  const tbody = document.getElementById('preview-body');
  tbody.innerHTML = '';
  inventors.forEach((inv, idx) => {
    const tr = document.createElement('tr');
    tr.id = `prev-${inv.id}`;
    tr.innerHTML = `
      <td class="num-cell">${idx+1}</td>
      <td><span class="editable" contenteditable="true" onblur="updateInv(${inv.id},'name',this.innerText.trim())">${escHtml(inv.name)}</span></td>
      <td><span class="editable" contenteditable="true" onblur="updateInv(${inv.id},'address',this.innerText.trim())">${escHtml(inv.address)}</span></td>
      <td><button class="btn-del-sm" onclick="removeInv(${inv.id})">✕</button></td>`;
    tbody.appendChild(tr);
  });
  const addTr = document.createElement('tr');
  addTr.id = 'add-row';
  addTr.innerHTML = `<td></td><td colspan="2"><button class="btn-add-inline" onclick="addInv()">+ 발명자 추가</button></td><td></td>`;
  tbody.appendChild(addTr);
  document.getElementById('inv-count-badge').textContent = `${inventors.length}명`;
  document.getElementById('inv-count-badge2').textContent = `${inventors.length}명`;
}
function updateInv(id,field,val){const inv=inventors.find(i=>i.id===id);if(inv)inv[field]=val;}
function removeInv(id){inventors=inventors.filter(i=>i.id!==id);renderPreview();}
function addInv(){const id=++nextId;inventors.push({id,name:'',address:''});renderPreview();const rows=document.querySelectorAll('#preview-body tr:not(#add-row)');const last=rows[rows.length-1];if(last)last.querySelector('.editable')?.focus();}
function backToPaste(){document.getElementById('section-step1-preview').style.display='none';document.getElementById('section-step1').style.display='block';setStep(1);}

// 영문 주소: 원문에서 국가코드(약어)만 Full Name으로 교체, 나머지는 원문 그대로
function normalizeEnAddress(original, aiResult) {
  const codeMap = {
    US:'USA', KR:'Republic of Korea', JP:'Japan', CN:'China', DE:'Germany',
    FR:'France', GB:'United Kingdom', CA:'Canada', AU:'Australia',
    NL:'Netherlands', SE:'Sweden', CH:'Switzerland', IT:'Italy',
    ES:'Spain', IN:'India', TW:'Taiwan', SG:'Singapore', IL:'Israel',
    FI:'Finland', DK:'Denmark', NO:'Norway', BE:'Belgium', AT:'Austria',
    NZ:'New Zealand', BR:'Brazil', MX:'Mexico', RU:'Russia', PL:'Poland',
    CZ:'Czech Republic', HU:'Hungary', PT:'Portugal', IE:'Ireland',
    ZA:'South Africa', HK:'Hong Kong', MY:'Malaysia', TH:'Thailand',
    VN:'Vietnam', ID:'Indonesia', PH:'Philippines'
  };
  // 괄호형 코드 (US), (DE) 등 교체
  let result = original.replace(/\s*\(([A-Z]{2})\)\s*$/, (_, code) =>
    codeMap[code] ? ', ' + codeMap[code] : ' (' + code + ')'
  );
  // 이미 국가명이 있으면 그대로, 없고 AI가 추가했으면 AI 결과에서 국가명만 추출해 붙이기
  const hasCountry = Object.values(codeMap).some(n => result.toLowerCase().endsWith(n.toLowerCase()));
  if (!hasCountry && aiResult) {
    const match = Object.values(codeMap).find(n => aiResult.toLowerCase().endsWith(n.toLowerCase()));
    if (match) result = result.replace(/,?\s*$/, '') + ', ' + match;
  }
  return result;
}

// 고정 음역 후처리 치환표
const KR_FIXED = [
  ['펜실베이니아', '펜실베니아'],
  ['필라델피ア', '필라델피아'],
  ['1스트', '1번'],
  ['2번드', '2번'],
  ['3번드', '3번'],
];

function applyFixedTerms(text) {
  if (!text) return text;
  let t = text;
  for (const [from, to] of KR_FIXED) t = t.split(from).join(to);
  // 한글 음역 성명에서 성과 이름 사이 쉼표 제거: "홍길, 동" → "홍길 동"
  // 한글 문자 뒤 쉼표+공백+한글 문자 패턴 제거
  t = t.replace(/([\uAC00-\uD7A3]+),\s+([\uAC00-\uD7A3])/g, '$1 $2');
  return t;
}

function renderResultCell(id) {
  const r = translationResults[id];
  if (!r) return;
  const ee = document.getElementById(`en-name-${id}`);
  if (ee) {
    ee.className = 'translated';
    ee.innerHTML = `<span class="result-editable" contenteditable="${editMode}" id="edit-en-${id}">${escHtml(r.en_name||'—')}</span>`;
  }
  const ne = document.getElementById(`kr-name-${id}`);
  const ae = document.getElementById(`kr-addr-${id}`);
  if (ne) {
    ne.className = 'translated';
    ne.innerHTML = `<span class="result-editable" contenteditable="${editMode}" id="edit-name-${id}">${escHtml(r.kr_name||'—')}</span>`;
  }
  if (ae) {
    ae.className = 'translated kr-addr-cell';
    const raw = r.kr_address_raw || '';
    if (raw.includes('주소')) {
      const p1 = raw.match(/주소\s*1\s*:\s*([^/]+)/)?.[1]?.trim() || '';
      const p2 = raw.match(/주소\s*2\s*:\s*(.+)/s)?.[1]?.trim() || '';
      ae.innerHTML =
        (p1 ? `<span class="addr-line"><span class="addr-label">주소 1</span><span class="result-editable" contenteditable="${editMode}" id="edit-addr1-${id}">${escHtml(p1)}</span></span>` : '') +
        (p2 ? `<span class="addr-line"><span class="addr-label">주소 2</span><span class="result-editable" contenteditable="${editMode}" id="edit-addr2-${id}">${escHtml(p2)}</span></span>` : '');
    } else {
      ae.innerHTML = `<span class="result-editable" contenteditable="${editMode}" id="edit-addr1-${id}">${escHtml(raw||'—')}</span>`;
    }
  }
}

/* ── Edit Mode ── */
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('btn-edit');
  const table = document.getElementById('result-table');
  if (editMode) {
    btn.innerHTML = '✅ 수정 완료'; btn.classList.add('active');
    table.classList.add('edit-mode');
  } else {
    inventors.forEach(inv => {
      const enEl = document.getElementById(`edit-en-${inv.id}`);
      const nameEl = document.getElementById(`edit-name-${inv.id}`);
      const addr1El = document.getElementById(`edit-addr1-${inv.id}`);
      const addr2El = document.getElementById(`edit-addr2-${inv.id}`);
      if (translationResults[inv.id]) {
        if (enEl) translationResults[inv.id].en_name = enEl.innerText.trim();
        if (nameEl) translationResults[inv.id].kr_name = nameEl.innerText.trim();
        const a1 = addr1El ? addr1El.innerText.trim() : '';
        const a2 = addr2El ? addr2El.innerText.trim() : '';
        translationResults[inv.id].kr_address_raw = a2 ? `주소 1: ${a1} / 주소 2: ${a2}` : a1;
      }
    });
    btn.innerHTML = '✏️ 수정'; btn.classList.remove('active');
    table.classList.remove('edit-mode');
  }
  inventors.forEach(inv => renderResultCell(inv.id));
}

/* ── Save / Load ── */
function openSaveModal() {
  document.getElementById('case-number-input').value = currentPCT || '';
  document.getElementById('modal-save').classList.add('open');
}
async function saveCase() {
  const no = document.getElementById('case-number-input').value.trim();
  if (!no) { alert('건 번호를 입력해주세요.'); return; }
  const payload = {
    caseNo: no, pct: currentPCT,
    savedAt: new Date().toLocaleString('ko-KR'),
    inventors, translationResults,
    nationalities: Object.fromEntries(inventors.map(inv=>[inv.id, document.getElementById(`nat-${inv.id}`)?.value||'']))
  };
  try {
    await window.storage.set(`case:${no}`, JSON.stringify(payload));
    closeModal('modal-save');
    alert(`✅ "${no}" 사건이 저장되었습니다.`);
  } catch(e) { alert('저장 중 오류가 발생했습니다.'); }
}

function filterCases() {
  const q = document.getElementById('case-search-input').value.trim().toLowerCase();
  const body = document.getElementById('saved-list-body');
  body.innerHTML = '';
  const filtered = q ? allSavedItems.filter(d => d.caseNo.toLowerCase().includes(q) || (d.pct||'').toLowerCase().includes(q)) : allSavedItems;
  if (!filtered.length) { body.innerHTML = '<span style="color:#a0aec0;font-size:0.85rem;">검색 결과가 없습니다.</span>'; return; }
  filtered.forEach(d => body.appendChild(buildSavedItem(d)));
}
function buildSavedItem(d) {
  const div = document.createElement('div');
  div.className = 'saved-item';
  div.innerHTML = `
    <div class="saved-item-info">
      <span class="saved-item-no">📁 ${escHtml(d.caseNo)}</span>
      <span class="saved-item-date">${escHtml(d.savedAt||'')} · 발명자 ${d.inventors?.length||0}명${d.pct?' · '+escHtml(d.pct):''}</span>
    </div>
    <div class="saved-item-actions">
      <button class="btn-xs load" onclick="loadCase(${JSON.stringify(JSON.stringify(d))})">불러오기</button>
      <button class="btn-xs del" onclick="deleteCase('case:${escHtml(d.caseNo)}',this)">삭제</button>
    </div>`;
  return div;
}
async function openLoadModal() {
  const body = document.getElementById('saved-list-body');
  body.innerHTML = '<span style="color:#a0aec0;font-size:0.85rem;">불러오는 중...</span>';
  document.getElementById('case-search-input').value = '';
  allSavedItems = [];
  document.getElementById('modal-load').classList.add('open');
  try {
    const result = await window.storage.list('case:');
    const keys = result?.keys || [];
    if (!keys.length) { body.innerHTML = '<span style="color:#a0aec0;font-size:0.85rem;">저장된 사건이 없습니다.</span>'; return; }
    for (const key of keys) {
      const r = await window.storage.get(key);
      if (r) allSavedItems.push(JSON.parse(r.value));
    }
    allSavedItems.sort((a,b) => new Date(b.savedAt||0) - new Date(a.savedAt||0));
    body.innerHTML = '';
    allSavedItems.forEach(d => body.appendChild(buildSavedItem(d)));
  } catch(e) { body.innerHTML = '<span style="color:#e53e3e;font-size:0.85rem;">불러오기 오류</span>'; }
}
function loadCase(jsonStr) {
  const d = JSON.parse(jsonStr);
  currentPCT = d.pct || '';
  inventors = d.inventors || [];
  translationResults = d.translationResults || {};
  const nats = d.nationalities || {};
  updateBadges(currentPCT);
  closeModal('modal-load');
  document.getElementById('section-step1').style.display = 'none';
  document.getElementById('section-step1-preview').style.display = 'none';
  document.getElementById('section-step2').style.display = 'block';
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  inventors.forEach((inv, idx) => {
    const code = extractCountryCode(inv.address);
    const residenceBadge = code ? `<span class="country-code-badge">${code}</span>` : `<span style="color:#a0aec0;">—</span>`;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num-cell">${idx+1}</td>
      <td><strong>${escHtml(inv.name)}</strong></td>
      <td id="kr-name-${inv.id}">—</td>
      <td>${escHtml(inv.address)}</td>
      <td id="kr-addr-${inv.id}">—</td>
      <td style="text-align:center;">${residenceBadge}</td>
      <td><input class="nat-input" id="nat-${inv.id}" value="${escHtml(nats[inv.id]||'')}" /></td>`;
    tbody.appendChild(tr);
    renderResultCell(inv.id);
  });
  editMode = false;
  document.getElementById('result-table').classList.remove('edit-mode');
  const btn = document.getElementById('btn-translate');
  btn.innerHTML = '✅ 번역 완료'; btn.style.background = '#38a169'; btn.disabled = true;
  document.getElementById('inv-count-badge2').textContent = `${inventors.length}명`;
  showPostTranslationButtons();
  document.getElementById('btn-edit').innerHTML = '✏️ 수정';
  document.getElementById('btn-edit').classList.remove('active');
  setStep(3);
}
async function deleteCase(key, btnEl) {
  if (!confirm('삭제하시겠습니까?')) return;
  await window.storage.delete(key);
  btnEl.closest('.saved-item').remove();
}

/* ── Mail ── */
function openMailModal() {
  const invList = inventors.map((inv, i) => {
    const r = translationResults[inv.id] || {};
    const raw = r.kr_address_raw || '';
    const p1 = raw.match(/주소\s*1\s*:\s*([^/]+)/)?.[1]?.trim() || raw;
    const p2 = raw.match(/주소\s*2\s*:\s*(.+)/s)?.[1]?.trim() || '';
    const nat = document.getElementById(`nat-${inv.id}`)?.value || '';
    const residence = extractCountryCode(inv.address);
    return `  [${i+1}] ${inv.name} / ${r.kr_name||'—'}\n      영문 주소: ${inv.address}\n      한글 주소 1: ${p1||'—'}\n      한글 주소 2: ${p2||'—'}\n      거주국: ${residence||'—'} / 국적: ${nat}`;
  }).join('\n\n');
  const mail = `안녕하세요,\n\n본건 발명자 정보 음역 검토 요청드립니다.\n\n[발명자 목록]\n${invList}\n\n감사합니다.`;
  document.getElementById('mail-preview-box').textContent = mail;
  document.getElementById('modal-mail').classList.add('open');
}
function openOutlook() {
  const subject = encodeURIComponent(`[검토 요청] ${currentPCT||'PCT 출원'} 발명자 정보 음역본`);
  const body = encodeURIComponent(document.getElementById('mail-preview-box').textContent);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}
function copyMail() {
  const text = document.getElementById('mail-preview-box').textContent;
  const btn = document.getElementById('btn-copy-mail');
  navigator.clipboard.writeText(text).then(() => {
    if (btn) { btn.textContent = '✅ 복사됨!'; setTimeout(() => { btn.innerHTML = '📋 메일 복사'; }, 2000); }
  }).catch(() => {
    // fallback for clipboard API failure
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) { btn.textContent = '✅ 복사됨!'; setTimeout(() => { btn.innerHTML = '📋 메일 복사'; }, 2000); }
  });
}

/* ── New Search ── */
function newSearch() {
  inventors = []; translationResults = {}; currentPCT = ''; editMode = false;
  const pctInput = document.getElementById('pct-input');
  if (pctInput) pctInput.value = '';
  const pasteBox = document.getElementById('paste-box');
  if (pasteBox) pasteBox.value = '';
  const parsingStatus = document.getElementById('parsing-status');
  if (parsingStatus) parsingStatus.innerHTML = '';
  document.getElementById('section-step2').style.display = 'none';
  document.getElementById('section-step1-preview').style.display = 'none';
  document.getElementById('section-step1').style.display = 'block';
  setStep(1);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function setStep(n) { for(let i=1;i<=3;i++){const el=document.getElementById(`sb${i}`);el.className='step'+(i<n?' done':i===n?' active':'');} }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
